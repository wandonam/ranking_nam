<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쿠팡 급하락 브랜드</title>
  <link rel="stylesheet" href="../../css/style.css" />
</head>
<body>
  <div class="canvas">
    <section class="card">

      <div class="top-bar">
        <div class="top-left">
          <img src="../../images/instagram.png" alt="instagram" class="insta-logo" />
          <span class="ranking-name">RANKING_NAM</span>
        </div>
        <div class="top-right">
          출처: 쿠팡 (2026년 04월 09일 ver.)
        </div>
      </div>

      <div class="hero-section">
        <div class="hero-left">
          <img src="../../images/coupang.png" alt="쿠팡" class="hero-logo" />
        </div>
        <div class="hero-right trend-hero-right">
          <div class="trend-title-lines">
            <p class="trend-title-type">급하락</p>
            <p class="trend-title-brand">브랜드</p>
          </div>
          <span class="trend-arrow-symbol trend-arrow-down">▼</span>
        </div>
      </div>

      <div class="trend-grid">
        
    <div class="mini-card" style="background-color:#A7A8FF;">
      <div class="mini-rank-row">
        <span class="mini-rank-num">110위</span><span class="mini-diff mini-diff-down">▼24</span>
      </div>
      <div class="mini-image-wrap">
        <img src="../../../CRAWLING/00_Database/02_coupang/01_healthyfood/20260409/110.jpg" alt="110위 상품" class="mini-product-img" />
      </div>
      <div class="mini-brand">박카스</div>
    </div>
    
      </div>

    </section>
  </div>
</body>
</html>
