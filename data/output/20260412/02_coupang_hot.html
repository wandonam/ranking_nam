<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쿠팡 급상승 브랜드</title>
  <link rel="stylesheet" href="../../../GENERATE/css/style.css" />
</head>
<body>
  <div class="canvas">
    <section class="card">

      <div class="top-bar">
        <div class="top-left">
          <img src="../../../GENERATE/images/instagram.png" alt="instagram" class="insta-logo" />
          <span class="ranking-name">RANKING_NAM</span>
        </div>
        <div class="top-right">
          출처: 쿠팡 (2026년 04월 12일 ver.)
        </div>
      </div>

      <div class="hero-section">
        <div class="hero-left">
          <img src="../../../GENERATE/images/coupang.png" alt="쿠팡" class="hero-logo" />
        </div>
        <div class="hero-right trend-hero-right">
          <div class="trend-title-lines">
            <p class="trend-title-type">급상승</p>
            <p class="trend-title-brand">브랜드</p>
          </div>
          <span class="trend-arrow-symbol trend-arrow-hot">▲</span>
        </div>
      </div>

      <div class="trend-grid">
        
      </div>

    </section>
  </div>
</body>
</html>
